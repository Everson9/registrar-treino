<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Academia</title>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <span class="logo-title">ACADEMIA</span>
          <span class="logo-sub">TRACKER</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <span class="stat-num" id="stat-treinos">—</span>
          <span class="stat-label">treinos</span>
        </div>
        <div class="stat-pill">
          <span class="stat-num" id="stat-exercicios">—</span>
          <span class="stat-label">exercícios</span>
        </div>
      </div>
    </div>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="treinos">
        <span>🗓</span> Treinos
      </button>
      <button class="tab-btn" data-tab="exercicios">
        <span>🏋️</span> Exercícios
      </button>
    </div>
  </nav>

  <main class="main-content">

    <!-- ABA: TREINOS -->
    <div id="tab-treinos" class="tab-panel active-panel">
      <div class="panel-grid">

        <section class="glass-card">
          <div class="card-header-line">
            <h2 class="card-title" id="form-title">NOVO TREINO</h2>
            <div class="title-bar"></div>
          </div>
          <form id="treino-form">
            <input type="hidden" id="treino-id" />
            <div class="field-group">
              <label class="field-label" for="titulo">Título</label>
              <input type="text" id="titulo" class="field-input" placeholder="Ex: Peito e Tríceps" required />
            </div>
            <div class="field-group">
              <label class="field-label" for="descricao">Descrição</label>
              <textarea id="descricao" class="field-input field-textarea" placeholder="Detalhes do treino..." required></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="realizadoEm">Data e hora</label>
              <input type="datetime-local" id="realizadoEm" class="field-input" required />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Salvar treino</button>
              <button type="button" id="cancel-treino-edit" class="btn-ghost hidden">Cancelar</button>
            </div>
            <p id="treino-message" class="form-message"></p>
          </form>
        </section>

        <section class="glass-card">
          <div class="card-header-line">
            <h2 class="card-title">HISTÓRICO</h2>
            <button id="reload-treinos" class="btn-reload">↻</button>
          </div>
          <div id="treinos-list" class="entries-container"></div>
        </section>

      </div>
    </div>

    <!-- ABA: EXERCÍCIOS -->
    <div id="tab-exercicios" class="tab-panel">
      <div class="panel-grid">

        <section class="glass-card">
          <div class="card-header-line">
            <h2 class="card-title" id="exercicio-form-title">NOVO EXERCÍCIO</h2>
            <div class="title-bar"></div>
          </div>
          <form id="exercicio-form">
            <input type="hidden" id="exercicio-id" />
            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="exercicio-nome">Nome *</label>
                <input type="text" id="exercicio-nome" class="field-input" placeholder="Ex: Supino Reto" required />
              </div>
              <div class="field-group">
                <label class="field-label" for="exercicio-grupo">Grupo muscular *</label>
                <input type="text" id="exercicio-grupo" class="field-input" placeholder="Ex: Peito" required />
              </div>
            </div>
            <div class="field-row three-col">
              <div class="field-group">
                <label class="field-label" for="exercicio-series">Séries *</label>
                <input type="number" id="exercicio-series" class="field-input" min="1" placeholder="4" required />
              </div>
              <div class="field-group">
                <label class="field-label" for="exercicio-repeticoes">Reps *</label>
                <input type="number" id="exercicio-repeticoes" class="field-input" min="1" placeholder="12" required />
              </div>
              <div class="field-group">
                <label class="field-label" for="exercicio-carga">Carga (kg)</label>
                <input type="number" id="exercicio-carga" class="field-input" min="0" step="0.5" placeholder="80" />
              </div>
            </div>
            <div class="field-group">
              <label class="field-label" for="exercicio-observacao">Observação</label>
              <textarea id="exercicio-observacao" class="field-input field-textarea" placeholder="Ex: Pegada fechada, foco na contração..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Salvar exercício</button>
              <button type="button" id="cancel-exercicio-edit" class="btn-ghost hidden">Cancelar</button>
            </div>
            <p id="exercicio-message" class="form-message"></p>
          </form>
        </section>

        <section class="glass-card">
          <div class="card-header-line">
            <h2 class="card-title">CATÁLOGO</h2>
            <button id="reload-exercicios" class="btn-reload">↻</button>
          </div>
          <div id="exercicios-list" class="entries-container"></div>
        </section>

      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
